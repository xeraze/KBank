<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBank — №1 банк на Півдні України</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at top right, #1a1a1a, #000000); 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .mono-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
        }

        #order-modal, #success-modal, #tariffs-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }

        .modal-content { background: #111; border: 1px solid #333; width: 95%; max-width: 480px; padding: 2.5rem; border-radius: 2.5rem; }

        input, select, textarea { 
            background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; 
            width: 100%; padding: 0.8rem 1.2rem; border-radius: 1rem; font-size: 0.9rem; margin-top: 0.4rem;
        }
        input:focus, select:focus, textarea:focus { border-color: #ffffff !important; outline: none; }
        
        label { color: #888; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.5rem; }

        .btn-primary { background: #fff; color: #000; font-weight: 900; transition: all 0.3s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        
        .status-pending { color: #666 !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="order-modal">
        <div class="modal-content">
            <h3 class="text-2xl font-black mb-1 uppercase italic tracking-tighter">Оформлення кредиту</h3>
            <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-widest font-bold border-b border-white/5 pb-2">KBank Security System</p>
            
            <div class="space-y-4">
                <div>
                    <label>Сума кредиту (₴)</label>
                    <input type="number" id="loan-amount" placeholder="Наприклад: 50000">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Термін (міс.)</label>
                        <select id="loan-term">
                            <option value="2">2 місяці</option>
                            <option value="4">4 місяці</option>
                            <option value="6">6 місяців</option>
                            <option value="8">8 місяців</option>
                        </select>
                    </div>
                    <div>
                        <label>Roblox Nickname</label>
                        <input type="text" id="roblox-nick" placeholder="Ваш нік">
                    </div>
                </div>

                <div>
                    <label>Мета кредиту</label>
                    <textarea id="loan-purpose" rows="3" placeholder="На що плануєте витратити кошти?"></textarea>
                </div>

                <div class="pt-6 flex gap-4">
                    <button onclick="closeModal('order-modal')" class="flex-1 text-sm font-bold text-gray-500 hover:text-white transition">СКАСУВАТИ</button>
                    <button onclick="sendCreditRequest()" class="flex-[2] btn-primary py-4 rounded-2xl text-sm">ПІДТВЕРДИТИ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tariffs-modal">
        <div class="modal-content">
            <h3 class="text-2xl font-black mb-6 uppercase italic tracking-tighter text-center">Тарифи банку</h3>
            <div class="space-y-4">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500 text-sm">Ставка</span>
                    <span class="font-bold">0.01% / день</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500 text-sm">Ліміт</span>
                    <span class="font-bold text-green-500">1,000,000 ₴</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500 text-sm">Обслуговування</span>
                    <span class="font-bold">0 ₴</span>
                </div>
            </div>
            <button onclick="closeModal('tariffs-modal')" class="w-full btn-primary py-4 rounded-2xl text-sm mt-8">ЗРОЗУМІЛО</button>
        </div>
    </div>

    <div id="success-modal">
        <div class="modal-content text-center">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-paper-plane text-2xl"></i></div>
            <h3 class="text-xl font-black mb-2 uppercase">Надіслано!</h3>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">Заявка на розгляді. Консультант банку зв'яжиться з вами у ПП Discord.</p>
            <button onclick="closeModal('success-modal')" class="w-full btn-primary py-4 rounded-2xl text-sm">ЗРОЗУМІЛО</button>
        </div>
    </div>

    <nav class="p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="LOGO_MAIN.png" alt="Logo" class="w-10 h-10 rounded-xl object-cover border border-white/10">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">K<span class="text-white/60">Bank</span></h1>
            </div>
            <div id="auth-section">
                <button id="login-btn" class="bg-[#5865F2] hover:bg-[#4752c4] px-6 py-3 rounded-2xl font-bold text-sm transition-all flex items-center gap-3 text-white">
                    <i class="fab fa-discord"></i> Увійти
                </button>
                <div id="user-profile" class="hidden flex items-center gap-4 bg-white/5 p-2 pr-5 rounded-2xl border border-white/5">
                    <img id="user-avatar" src="" class="w-10 h-10 rounded-xl">
                    <div class="text-left">
                        <p id="user-name" class="text-sm font-black leading-none text-white"></p>
                        <p id="user-credit-wrap" class="text-[10px] text-gray-500 mt-1 uppercase font-bold">
                            Кредит: <span id="credit-value" class="text-white">0 ₴</span>
                            <span id="pending-icon" class="hidden ml-1"><i class="fas fa-question-circle"></i></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <div>
                <h2 class="text-6xl font-black leading-none mb-6 tracking-tighter uppercase italic">Банк, який <br><span class="text-gray-500 text-4xl">розуміє тебе.</span></h2>
                <div class="flex gap-4">
                    <button onclick="openModal()" class="btn-primary px-10 py-5 rounded-3xl text-sm uppercase">Оформити кредит</button>
                    <button onclick="openTariffs()" class="bg-white/5 border border-white/10 px-10 py-5 rounded-3xl text-sm font-bold transition uppercase">Тарифи</button>
                </div>
            </div>
            <div class="relative">
                <div class="mono-card p-8 aspect-video flex flex-col justify-between shadow-2xl relative z-10">
                    <div class="flex justify-between items-start">
                        <img src="LOGO_MAIN.png" class="w-12 h-12 rounded-lg opacity-80">
                        <i class="fas fa-wifi rotate-90 text-white/20 text-xl"></i>
                    </div>
                    <p class="text-2xl font-bold tracking-widest text-white/90">•••• •••• •••• 2026</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLIENT_ID = '1488509930485841961';
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1488505884756938793/nx9kc5t7JlQAqN1cfIYraiTJqbOVaz5F-n1qZh-u-DPiW3VJ_4qE7BYCK_UKta-mDtjt';
        const REDIRECT_URI = window.location.href.split('#')[0].split('?')[0];
        
        const JSON_URL = 'https://raw.githubusercontent.com/xeraze/KBank/main/database.json';

        function openTariffs() { document.getElementById('tariffs-modal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openModal() {
            if (!localStorage.getItem('kbank_user')) return alert('Будь ласка, спочатку увійдіть!');
            document.getElementById('order-modal').style.display = 'flex';
        }

        document.getElementById('login-btn').onclick = () => {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        };

        window.onload = async () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');
            if (accessToken) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${accessToken}` } });
                const user = await res.json();
                localStorage.setItem('kbank_user', JSON.stringify(user));
                window.history.replaceState({}, document.title, REDIRECT_URI);
            }
            updateUI();
        };

        async function updateUI() {
            const user = JSON.parse(localStorage.getItem('kbank_user'));
            if (!user) return;

            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('user-profile').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.username;
            document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

            const valElem = document.getElementById('credit-value');
            const iconElem = document.getElementById('pending-icon');

            try {
                const response = await fetch(JSON_URL + '?t=' + new Date().getTime());
                const db = await response.json();
                const dbUser = db.users.find(u => u.id === user.id);

                if (dbUser && dbUser.status === 'approved') {
                    valElem.innerText = `${dbUser.amount} ₴`;
                    valElem.className = 'text-white font-black';
                    iconElem.classList.add('hidden');
                    return;
                }
            } catch (e) { console.log("JSON database not found yet."); }

            const localLoan = JSON.parse(localStorage.getItem('kbank_loan'));
            if (localLoan && localLoan.status === 'pending') {
                valElem.innerText = `${localLoan.amount} ₴`;
                valElem.className = 'status-pending';
                iconElem.classList.remove('hidden');
            } else {
                valElem.innerText = '0 ₴';
                valElem.className = 'text-white opacity-20';
            }
        }

        async function sendCreditRequest() {
            const amount = document.getElementById('loan-amount').value;
            const term = document.getElementById('loan-term').value;
            const nick = document.getElementById('roblox-nick').value;
            const purpose = document.getElementById('loan-purpose').value;
            const user = JSON.parse(localStorage.getItem('kbank_user'));

            if (!amount || !nick || !purpose) return alert('Заповніть всі поля!');

            localStorage.setItem('kbank_loan', JSON.stringify({ amount, status: 'pending' }));

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: "💳 ЗАЯВКА НА КРЕДИТ",
                        color: 0xffffff,
                        fields: [
                            { name: "Сума", value: `${amount} ₴`, inline: true },
                            { name: "Термін", value: `${term} міс.`, inline: true },
                            { name: "Клієнт", value: `<@${user.id}>` }
                        ]
                    }]
                })
            });

            closeModal('order-modal');
            document.getElementById('success-modal').style.display = 'flex';
            updateUI();
        }
    </script>
</body>
</html>
