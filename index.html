<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBank — Твій надійний банк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: radial-gradient(circle at top right, #1a1a1a, #000000); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .mono-card { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 2rem; }
        #order-modal, #success-modal, #tariffs-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-content { background: #111; border: 1px solid #333; width: 95%; max-width: 500px; padding: 2.5rem; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input, select, textarea { background: #1a1a1a!important; border: 1px solid #333!important; color: white!important; width: 100%; padding: 1rem; border-radius: 1.2rem; font-size: 0.95rem; margin-top: 0.5rem; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #ffffff!important; background: #222!important; outline: none; }
        label { color: #aaa; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.5rem; }
        .btn-primary { background: #fff; color: #000; font-weight: 900; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255,255,255,0.15); }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 700; transition: all 0.3s; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-loading { animation: pulse 2s infinite; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="order-modal">
        <div class="modal-content">
            <h3 class="text-3xl font-black mb-1 uppercase italic tracking-tighter">Новий Кредит</h3>
            <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-widest font-bold border-b border-white/5 pb-3">KBank Security System</p>
            <div class="space-y-5">
                <div><label>Сума кредиту (₴)</label><input type="number" id="loan-amount" placeholder="Наприклад: 50000"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Термін</label><select id="loan-term"><option value="2">2 місяці</option><option value="4">4 місяці</option><option value="6">6 місяців</option><option value="8">8 місяців</option></select></div>
                    <div><label>Roblox Username</label><input type="text" id="roblox-nick" placeholder="Username"></div>
                </div>
                <div><label>Мета</label><textarea id="loan-purpose" rows="3" placeholder="Якщо мета не влаштує банк, він має право відмовити вам у оформленні кредиту"></textarea></div>
                <div class="pt-6 flex flex-col gap-3">
                    <button onclick="sendCreditRequest()" class="btn-primary py-5 rounded-2xl text-sm uppercase">Відправити</button>
                    <button onclick="closeModal('order-modal')" class="text-xs font-bold text-gray-600 hover:text-white uppercase">Скасувати</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tariffs-modal">
        <div class="modal-content">
            <h3 class="text-3xl font-black mb-8 uppercase italic text-center">Тарифи</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div><p class="text-[10px] text-gray-500 uppercase font-black">Ставка</p><p class="font-bold text-lg text-white">0.5% <span class="text-xs text-gray-500 font-normal italic">на добу</span></p></div>
                    <i class="fas fa-percent text-white/20 text-xl"></i>
                </div>
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div><p class="text-[10px] text-gray-500 uppercase font-black">Ліміт</p><p class="font-bold text-lg text-green-500">1,000,000 ₴</p></div>
                    <i class="fas fa-vault text-white/20 text-xl"></i>
                </div>
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div><p class="text-[10px] text-gray-500 uppercase font-black">Комісія</p><p class="font-bold text-lg text-white">0 ₴</p></div>
                    <i class="fas fa-hand-holding-dollar text-white/20 text-xl"></i>
                </div>
            </div>
            <button onclick="closeModal('tariffs-modal')" class="w-full btn-primary py-5 rounded-2xl mt-8 uppercase font-black">Зрозуміло</button>
        </div>
    </div>

    <div id="success-modal">
        <div class="modal-content text-center">
            <div class="w-24 h-24 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-check text-3xl text-green-500"></i></div>
            <h3 class="text-2xl font-black mb-8 uppercase italic">Відправлено!</h3>
            <button onclick="closeModal('success-modal')" class="w-full btn-primary py-5 rounded-2xl uppercase font-black">OK</button>
        </div>
    </div>

    <nav class="p-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4"><img src="LOGO_MAIN.png" class="w-12 h-12 rounded-2xl"><h1 class="text-3xl font-black italic uppercase">K<span class="text-white/50">Bank</span></h1></div>
            <div id="auth-section">
                <button id="login-btn" class="bg-[#5865F2] px-8 py-4 rounded-2xl font-black text-xs text-white uppercase tracking-widest hover:bg-[#4752c4] transition-all">Увійти</button>
                <div id="user-profile" class="hidden flex items-center gap-4 bg-white/5 p-2 pr-6 rounded-3xl border border-white/5">
                    <img id="user-avatar" src="" class="w-12 h-12 rounded-2xl border border-white/10">
                    <div class="text-left">
                        <p id="user-name" class="text-sm font-black text-white"></p>
                        <p class="text-[10px] text-gray-500 uppercase font-black tracking-tighter">
                            Кредит: <span id="credit-value" class="text-white">0 ₴</span>
                            <span id="pending-icon" class="hidden ml-1 text-white"><i class="fas fa-spinner fa-spin text-[8px]"></i></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
            <div class="text-center lg:text-left">
                <h2 class="text-7xl font-black leading-[0.9] mb-8 uppercase italic">ГРОШІ <br><span class="text-gray-500">ТУТ І ЗАРАЗ.</span></h2>
                <div class="flex flex-wrap gap-5 justify-center lg:justify-start">
                    <button onclick="openModal()" class="btn-primary px-12 py-6 rounded-[2rem] text-sm uppercase">Оформити кредит</button>
                    <button onclick="openTariffs()" class="btn-secondary px-12 py-6 rounded-[2rem] text-sm uppercase">Тарифи</button>
                </div>
            </div>
            <div class="relative hidden lg:block">
                <div class="mono-card p-10 aspect-video flex flex-col justify-between shadow-2xl relative z-10 overflow-hidden text-white/90">
                    <div class="flex justify-between items-start"><img src="LOGO_MAIN.png" class="w-16 h-16 rounded-2xl"><i class="fas fa-wifi rotate-90 text-2xl opacity-20"></i></div>
                    <p class="text-3xl font-bold tracking-[0.2em]">•••• •••• •••• 2026</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CLIENT_ID = '1488509930485841961';
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1488505884756938793/nx9kc5t7JlQAqN1cfIYraiTJqbOVaz5F-n1qZh-u-DPiW3VJ_4qE7BYCK_UKta-mDtjt';
        const JSON_URL = 'https://raw.githubusercontent.com/xeraze/KBank/main/database.json';
        
        let hasActiveLoan = false;

        function openTariffs() { document.getElementById('tariffs-modal').style.display = 'flex'; }
        function openModal() {
            if (!localStorage.getItem('kbank_user')) return alert('Будь ласка, увійти!');
            if (hasActiveLoan) return alert('У вас вже є активний кредит!');
            document.getElementById('order-modal').style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('login-btn').onclick = () => {
            const rUri = encodeURIComponent(window.location.href.split('#')[0]);
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${rUri}&response_type=token&scope=identify`;
        };

        window.onload = async () => {
            const frag = new URLSearchParams(window.location.hash.slice(1));
            const token = frag.get('access_token');
            if (token) {
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                    localStorage.setItem('kbank_user', JSON.stringify(await res.json()));
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) { console.error(e); }
            }
            updateUI();
        };

        async function updateUI() {
            const user = JSON.parse(localStorage.getItem('kbank_user'));
            if (!user) { localStorage.removeItem('kbank_loan'); return; }

            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('user-profile').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.username;
            document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
            
            const valElem = document.getElementById('credit-value');
            const iconElem = document.getElementById('pending-icon');
            hasActiveLoan = false;

            try {
                const res = await fetch(JSON_URL + '?nocache=' + Math.random());
                const db = await res.json();
                const dbUser = db.users.find(u => String(u.id) === String(user.id));
                
                if (dbUser) {
                    if (dbUser.status === 'approved') {
                        valElem.innerText = `${dbUser.amount.toLocaleString()} ₴`;
                        valElem.className = 'text-white font-black opacity-100';
                        iconElem.classList.add('hidden');
                        hasActiveLoan = true;
                        localStorage.removeItem('kbank_loan');
                        return;
                    } else if (dbUser.status === 'paid') {
                        valElem.innerText = '0 ₴';
                        valElem.className = 'text-white font-bold opacity-100';
                        iconElem.classList.add('hidden');
                        hasActiveLoan = false;
                        localStorage.removeItem('kbank_loan');
                        return;
                    } else if (dbUser.status === 'pending') {
                        valElem.innerText = `${dbUser.amount.toLocaleString()} ₴`;
                        valElem.className = 'text-white opacity-40 italic status-loading';
                        iconElem.classList.remove('hidden');
                        hasActiveLoan = true;
                        return;
                    }
                } else {
                    localStorage.removeItem('kbank_loan');
                }
            } catch (e) { console.log("DB sync error"); }

            const local = JSON.parse(localStorage.getItem('kbank_loan'));
            if (local && local.status === 'pending') {
                valElem.innerText = `${parseInt(local.amount).toLocaleString()} ₴`;
                valElem.className = 'text-white opacity-40 italic status-loading';
                iconElem.classList.remove('hidden');
                hasActiveLoan = true;
            } else {
                valElem.innerText = '0 ₴';
                valElem.className = 'text-white font-bold opacity-100'; // БІЛИЙ НУЛЬ
                iconElem.classList.add('hidden');
                hasActiveLoan = false;
            }
        }

        async function sendCreditRequest() {
            const amount = document.getElementById('loan-amount').value;
            const term = document.getElementById('loan-term').value;
            const nick = document.getElementById('roblox-nick').value;
            const purpose = document.getElementById('loan-purpose').value;
            const user = JSON.parse(localStorage.getItem('kbank_user'));

            if (!amount || !nick || !purpose) return alert('Заповніть усі поля!');

            const payload = {
                embeds: [{
                    title: "НОВА ЗАЯВКА НА КРЕДИТ",
                    color: 0xffffff,
                    fields: [
                        { name: "Клієнт", value: `<@${user.id}> (${user.username})` },
                        { name: "Сума", value: `**${amount} ₴**`, inline: true },
                        { name: "Термін", value: `**${term} місяців**`, inline: true },
                        { name: "Roblox Nick", value: `\`${nick}\``, inline: true },
                        { name: "Мета", value: `\`\`\`${purpose}\`\`\`` }
                    ],
                    footer: { text: `ID: ${user.id}` },
                    timestamp: new Date()
                }]
            };

            try {
                await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                localStorage.setItem('kbank_loan', JSON.stringify({ amount, status: 'pending' }));
                closeModal('order-modal');
                document.getElementById('success-modal').style.display = 'flex';
                updateUI();
            } catch (e) { alert('Помилка відправки.'); }
        }
    </script>
</body>
</html>
